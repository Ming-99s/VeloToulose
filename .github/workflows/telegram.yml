name: Telegram Notification
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Telegram Topic
        env:
          TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message || github.event.pull_request.title }}
          COMMIT_URL: ${{ github.event.head_commit.url || github.event.pull_request.html_url }}
        run: |
          PAYLOAD=$(jq -n \
            --arg chat_id "$CHAT_ID" \
            --arg text "🔔 *New Update in $REPO*\n\n🌿 *Branch:* $BRANCH\n👤 *User:* $ACTOR\n📝 *Commit:* $COMMIT_MSG" \
            --arg url "$COMMIT_URL" \
            '{
              chat_id: $chat_id,
              message_thread_id: 5,
              parse_mode: "markdown",
              text: $text,
              reply_markup: {
                inline_keyboard: [[
                  { text: "🔗 View Changes", url: $url }
                ]]
              }
            }')

          curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"
