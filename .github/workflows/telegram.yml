name: Telegram Notification

on:
  push:
    branches:
      - '**'        # This forces it to watch EVERY branch (including Ming)
  pull_request:     # This handles the Merges you mentioned
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Telegram Topic
        env:
          TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          # Head commit is best for direct pushes
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
        run: |
          curl -s -X POST https://api.telegram.org/bot$TOKEN/sendMessage \
          -H 'Content-Type: application/json' \
          -d "{
            \"chat_id\": \"$CHAT_ID\",
            \"message_thread_id\": 5,
            \"parse_mode\": \"markdown\",
            \"text\": \"🔔 *New Update in $REPO*\n\n🌿 *Branch:* $BRANCH\n👤 *User:* $ACTOR\n📝 *Commit:* $COMMIT_MSG\",
            \"reply_markup\": {
              \"inline_keyboard\": [[
                { \"text\": \"🔗 View Changes\", \"url\": \"$COMMIT_URL\" }
              ]]
            }
          }"
