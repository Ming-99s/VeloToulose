name: Notify Telegram

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram Message
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage \
          -H "Content-Type: application/json" \
          -d '{
            "chat_id": "${{ secrets.CHAT_ID }}",
            "message_thread_id": 5,
            "text": "🚀 New push to ${{ github.repository }}\n👤 Author: ${{ github.actor }}\n📝 Message: ${{ github.event.head_commit.message }}\n\n🔗 View: ${{ github.event.head_commit.url }}"
          }'
